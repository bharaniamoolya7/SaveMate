spring.application.name=backend
server.port=8088

# Database configuration (Defaults to H2 for easy deployment)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/savemate;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# To use MySQL instead, set these Environment Variables:
# SPRING_DATASOURCE_URL=jdbc:mysql://host:port/db
# SPRING_DATASOURCE_USERNAME=root
# SPRING_DATASOURCE_PASSWORD=pass
# SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect

